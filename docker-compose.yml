version: '3.8'

services:
  # 🐘 PostgreSQL Database (For Core Backend)
  postgres:
    image: postgres:15-alpine
    container_name: luminai_postgres
    environment:
      POSTGRES_USER: luminai_user
      POSTGRES_PASSWORD: luminai_password
      POSTGRES_DB: luminai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luminai_user -d luminai_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 📬 Apache Kafka (For Data Engine Event Streaming)
  # Using Bitnami's image with KRaft (No Zookeeper required)
  kafka:
    image: bitnami/kafka:3.7
    container_name: luminai_kafka
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      # Fixed Cluster ID string (required by KRaft)
      - KAFKA_KRAFT_CLUSTER_ID=LuminAiKafkaClusterId1234 
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami/kafka

volumes:
  postgres_data:
  kafka_data:
