# ==============================================================================
# PRODUCTION PROFILE — Deployed on Render / Cloud
# ==============================================================================
# Activated via: SPRING_PROFILES_ACTIVE=prod (set on Render dashboard)
#
# All sensitive values are injected via environment variables.
# See API_key.example at the repo root for the full variable registry.
# ==============================================================================

spring:
  # ── DataSource — Neon PostgreSQL (pooled via PgBouncer) ────────────
  datasource:
    url: jdbc:postgresql://${POSTGRESQL_HOST}:${POSTGRESQL_PORT:5432}/${POSTGRESQL_DATABASE}?sslmode=require
    username: ${POSTGRESQL_USERNAME}
    password: ${POSTGRESQL_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: LuminaiHikariPool
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 20000
      connection-test-query: SELECT 1

  # ── JPA / Hibernate ────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        multiTenancy: SCHEMA
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        cache:
          use_second_level_cache: false
          use_query_cache: false
        connection:
          handling_mode: DELAYED_ACQUISITION_AND_RELEASE_AFTER_TRANSACTION
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true
        generate_statistics: false

  # ── Flyway ─────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    schemas: public

  # ── Kafka — Upstash (SASL/SCRAM over TLS) ─────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: SCRAM-SHA-256
      sasl.jaas.config: >-
        org.apache.kafka.common.security.scram.ScramLoginModule required
        username="${KAFKA_USERNAME}"
        password="${KAFKA_PASSWORD}";
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        linger.ms: 5
        batch-size: 16384
        compression.type: snappy
        spring.json.add.type.headers: true
    consumer:
      group-id: luminai-core-consumer-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      max-poll-records: 50
      properties:
        spring.json.trusted.packages: com.luminai.model.events
        spring.json.use.type.headers: true
    listener:
      ack-mode: manual_immediate
      concurrency: 3
      observation-enabled: true
    admin:
      auto-create: false
      properties:
        bootstrap.servers: ${KAFKA_BOOTSTRAP_SERVERS}

  # ── Redis — Upstash (TLS) ─────────────────────────────────────────
  data:
    redis:
      url: ${REDIS_URL:}
      ssl:
        enabled: true

  # ── Security — Keycloak OIDC (JWT validation) ──────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}

# ── Server ─────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

# ── Actuator ───────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── Logging — production-level (no debug noise) ────────────────────────
logging:
  level:
    root: WARN
    com.luminai: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    com.zaxxer.hikari: WARN
    org.springframework.kafka: WARN

# ── Application custom properties ──────────────────────────────────────
luminai:
  multitenancy:
    schema-prefix: tenant_
    default-schema: public
    require-tenant: true
  vault:
    encryption-key: ${VAULT_ENCRYPTION_KEY}
  kafka:
    topic:
      partitions: 3
      replication-factor: ${KAFKA_REPLICATION_FACTOR:1}
