spring:
  application:
    name: luminai-core
  # DataSource — single shared HikariCP pool (all tenants share connections)
  datasource:
    url: ${POSTGRESQL_URL:jdbc:postgresql://localhost:5432/luminai}
    username: ${POSTGRESQL_USERNAME:postgres}
    password: ${POSTGRESQL_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: LuminaiHikariPool
      minimum-idle: 5
      maximum-pool-size: 30
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

    properties:
      hibernate:
        multiTenancy: SCHEMA
           dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        cache:
          use_second_level_cache: false
          use_query_cache: false
        connection:
          handling_mode: DELAYED_ACQUISITION_AND_RELEASE_AFTER_TRANSACTION
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true
        generate_statistics: false

  # Flyway — manages schema migrations per tenant
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    schemas: public

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    # Producer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        linger.ms: 5
        batch-size: 16384
        compression.type: snappy
        spring.json.add.type.headers: true
  # Consumer
  consumer:
    group-id: luminai-core-consumer-group
    auto-offset-reset: earliest
    enable-auto-commit: false          # Manual ack via MANUAL_IMMEDIATE mode
    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    max-poll-records: 50
    properties:
      spring.json.trusted.packages: "*"
      spring.json.use.type.headers: true
      # Restrict in production:
      # spring.json.trusted.packages: com.luminai.model.events
 # Listener
  listener:
    ack-mode: manual_immediate
    concurrency: 3
    observation-enabled: true

    # ── Admin (topic auto-provisioning) ───────────────────────────────────────
    admin:
      # auto-create: true allows KafkaAdmin to create NewTopic beans on startup.
      # Set to false in production where topics are managed by Terraform/Confluent.
      auto-create: true
      properties:
        bootstrap.servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Logging
logging:
  level:
    root: INFO
    com.luminai: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    com.zaxxer.hikari: INFO

  # ── Security — Keycloak OIDC (local dev) ─────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/luminai}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/luminai/protocol/openid-connect/certs}

server:
  port: 8080
  shutdown: graceful
# Management / Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Application-specific tenant settings
luminai:
  multitenancy:
    schema-prefix: tenant_
    default-schema: public
    require-tenant: true
  vault:
    encryption-key: ${VAULT_ENCRYPTION_KEY:dev-only-local-key-32characters!}

