spring:
  application:
    name: luminai-core
  profiles:
    active: dev
  # DataSource — single shared HikariCP pool (all tenants share connections)
  datasource:
    url:
    username:
    password:
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: LuminaiHikariPool
      minimum-idle: 5
      maximum-pool-size: 30
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

    properties:
      hibernate:
        multiTenancy: SCHEMA
        dialect: org.hibernate.dialect.PostgresSQLDialect
        format_sql: false
        cache:
          use_second_level_cache: false
          use_query_cache: false
        connection:
          handling_mode: DELAYED_ACQUISITION_AND_RELEASE_AFTER_TRANSACTION
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true
        generate_statistics: false

  # Flyway — manages schema migrations per tenant
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    schemas: public

# Logging
logging:
  level:
    root: INFO
    com.luminai: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    com.zaxxer.hikari: INFO


server:
  port: 8080
  shutdown: graceful
# Management / Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Application-specific tenant settings
luminai:
  multitenancy:
    schema-prefix: tenant_
    default-schema: public
    require-tenant: true

