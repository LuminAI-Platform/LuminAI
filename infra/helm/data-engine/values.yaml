replicaCount: 1

image:
  repository: luminai/data-engine
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8000

env:
  KAFKA_BOOTSTRAP_SERVERS: "luminai-kafka:9092"
  POSTGRES_HOST: "luminai-postgres"
  POSTGRES_PORT: 5432
  MINIO_ENDPOINT: "luminai-minio:9000"

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 256Mi
